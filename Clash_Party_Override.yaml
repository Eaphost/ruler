mode: rule
allow-lan: false
unified-delay: true
tcp-concurrent: true
find-process-mode: always
sniffer:
  enable: true
  sniff:
    HTTP:
      ports:
      - 80
      - 8080-8880
      override-destination: true
    TLS:
      ports:
      - 443
      - 8443
    QUIC:
      ports:
      - 443
      - 8443
  skip-domain:
  - Mijia Cloud
  - +.push.apple.com
tun:
  enable: true
  stack: mixed
  dns-hijack:
    - any:53
    - tcp://any:53
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
  - 119.29.29.29
  - 180.184.1.1
  - 223.5.5.5
  nameserver:
  - https://dns.alidns.com/dns-query
  - https://doh.pub/dns-query
  fake-ip-filter:
  - +.miwifi.com
  - +.docker.io
  - +.market.xiaomi.com
  - +.push.apple.com
proxy-groups:
- name: 广告拦截
  type: select
  proxies:
  - REJECT-DROP
  - REJECT
  - DIRECT
  icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Reject.png
